name: Build Binary
on:
  release:
    types: [created]  # 创建 GitHub Release 时自动触发

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]  # 覆盖三大平台
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - os: windows-latest
            goos: linux
          - os: macos-latest
            goos: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"  # 确保静态编译
        run: go build -o dist/myapp-${{ matrix.goos }}-${{ matrix.goarch }} .
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/myapp-${{ matrix.goos }}-${{ matrix.goarch }}*
