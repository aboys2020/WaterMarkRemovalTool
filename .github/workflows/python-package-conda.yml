name: Build Windows EXE (Conda)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.9" # 与 README 要求的 3.9+ 保持一致

      - name: Create Conda Environment
        run: |
          # 1. 安装 README 中列出的核心依赖 (部分库在 conda 中名称不同)
          conda install -c conda-forge pyqt=5 pikepdf pymupdf opencv pillow numpy scikit-image poppler -y
          
          # 2. 安装 pip-only 的库
          pip install PyPDF2 pdf2image python-docx

      - name: Install PyInstaller
        run: |
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          # 根据 README，prod.py 是主图形界面入口
          pyinstaller --onefile --windowed prod.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterMarkRemovalTool-Windows
          path: dist/prod.exe
