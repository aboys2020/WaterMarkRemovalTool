name: Build Windows EXE (Conda)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.9"
        activate-environment: myenv
        channels: conda-forge, defaults

    - name: Install Dependencies
      shell: bash -l {0}
      run: |
        # 强制更新环境，确保安装最新的 PyQt5
        conda install -y pyqt=5 pikepdf pymupdf requests tqdm
        pip install pyinstaller

    - name: Verify Environment
      shell: bash -l {0}
      run: |
        python -c "import PyQt5; print('PyQt5 found:', PyQt5.__file__)"

    - name: Build with PyInstaller (Folder Mode)
      shell: bash -l {0}
      run: |
        # 关键修改：使用 --onedir 而不是 --onefile
        # PyQt5 在单文件模式下极易丢失插件，文件夹模式最稳定
        pyinstaller --name prod --windowed --clean prod.py

    - name: Compress to Single EXE (Optional)
      shell: bash -l {0}
      run: |
        # 如果你非要一个单独的 exe 文件，可以用 7z 把整个文件夹压成一个自解压包
        # 但建议先测试 dist/prod/prod.exe 是否能运行
        echo "Build finished. Check dist/prod/ folder."
        ls dist/prod/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Build
        # 上传整个文件夹，因为 PyQt5 需要旁边的 dll 和 plugins 文件夹
        path: dist/prod/
