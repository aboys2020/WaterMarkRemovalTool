name: Build Windows EXE
on:
  push:
    branches: [main]  # 仅当推送到 main 分支时触发

jobs:
  build:
    runs-on: windows-latest  # 关键：指定 Windows 环境
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"  # 按需修改 Go 版本

      - name: Build EXE
        run: |
          go build -o myapp.exe .  # 生成当前目录的 myapp.exe
          ls -l myapp.exe          # 验证文件是否存在

      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: windows-exe
          path: myapp.exe  # 上传生成的 EXE 文件
