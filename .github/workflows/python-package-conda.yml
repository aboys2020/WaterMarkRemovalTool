name: Build Windows EXE (Conda)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.9"
        activate-environment: myenv 
        channels: conda-forge, defaults
        channel-priority: strict

    - name: Cache conda packages
      uses: actions/cache@v3
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ hashFiles('**/environment.yml') }}
        restore-keys: |
          ${{ runner.os }}-conda-

    # --- 核心修改区域开始 ---
    
    # 1. 安装依赖：使用 pip 安装 PyQt5 往往比 conda 对 PyInstaller 更友好
    - name: Install Dependencies
      shell: bash -l {0}
      run: |
        conda install -c conda-forge pyqt=5 -y
        pip install pyinstaller pikepdf pymupdf
        
    # 2. 简单验证：只检查能不能导入，不查版本号，防止报错中断
    - name: Verify Environment
      shell: bash -l {0}
      run: |
        python -c "import PyQt5; print('PyQt5 loaded successfully')"
        
    # 3. 打包：增加 --hidden-import 确保所有组件都被抓取
    - name: Build EXE with PyInstaller
      shell: bash -l {0}
      run: |
        pyinstaller --onefile --windowed --hidden-import=PyQt5 --hidden-import=PyQt5.QtCore --hidden-import=PyQt5.QtGui prod.py

    # --- 核心修改区域结束 ---

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: dist/prod.exe
