name: Build Windows EXE (Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true 
        python-version: "3.9"
        activate-environment: myenv
        channels: conda-forge, defaults 

    - name: Fix Environment & Install Dependencies
      shell: bash -l {0}
      run: |
        # 1. 确保环境里有 pip (防止刚才的报错)
        conda install -n myenv pip -y
        
        # 2. 激活环境
        conda activate myenv
        
        # 3. 升级 pip (防止旧版 pip 安装失败)
        python -m pip install --upgrade pip
        
        # 4. 安装核心库 (指定版本防止冲突)
        # PyQt5 指定 5.15.x 是最稳的
        pip install PyQt5==5.15.9 pyinstaller
        
        # 5. 安装你项目其他的依赖 (如果有的话)
        # pip install -r requirements.txt 

    - name: Verify Environment (验证环境)
      shell: bash -l {0}
      run: |
        conda activate myenv
        echo "--- Python Path ---"
        where python
        echo "--- Pip List ---"
        pip list | grep -i pyqt
        pip list | grep -i installer

    - name: Build with PyInstaller (文件夹模式)
      shell: bash -l {0}
      run: |
        conda activate myenv
        
        # 关键：使用 --hidden-import 强制包含 PyQt5 模块
        # 先打成文件夹模式 (--onedir)，这样不容易丢 DLL
        pyinstaller --noconfirm --onedir --windowed \
          --name "MyApp" \
          --hidden-import=PyQt5 \
          --hidden-import=PyQt5.QtCore \
          --hidden-import=PyQt5.QtGui \
          --hidden-import=PyQt5.QtWidgets \
          prod.py

    - name: Zip the Artifact (压缩成单个文件方便下载)
      run: |
        # 将生成的文件夹压缩，因为单文件模式经常缺 Qt 插件
        Compress-Archive -Path dist\MyApp\* -DestinationPath MyApp_Portable.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Build
        path: MyApp_Portable.zip
