name: Build Windows EXE (Conda)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js (如果不需要可删除此步)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.9" 
        activate-environment: myenv
        channels: conda-forge, defaults # 关键：优先使用 conda-forge

    - name: Install Dependencies (关键修改)
      shell: bash -l {0}
      run: |
        # 1. 先升级 pip，防止旧版 pip 安装失败
        python -m pip install --upgrade pip
        
        # 2. 使用 conda 安装 PyQt5 并指定版本 (5.15.7 是最稳的版本之一)
        # 加上 -y 自动确认
        conda install -c conda-forge pyqt=5.15.7 -y
        
        # 3. 安装 PyInstaller
        pip install pyinstaller
        
        # 4. 如果你有 requirements.txt，在这里安装其他包
        # pip install -r requirements.txt

    - name: Verify Environment (验证环境)
      shell: bash -l {0}
      run: |
        echo "Checking Python..."
        python --version
        echo "Checking PyQt5..."
        python -c "from PyQt5 import QtWidgets; print('PyQt5 OK')"

    - name: Build with PyInstaller (文件夹模式)
      shell: bash -l {0}
      run: |
        # 使用 --onedir 模式打包，这对 PyQt5 最稳定
        # --name prod 指定生成的文件夹名字
        pyinstaller --onedir --name prod --clean prod.py

    - name: Zip the Artifact (压缩成单个文件方便下载)
      run: |
        # 将生成的 dist/prod 文件夹压缩成 zip
        Compress-Archive -Path dist/prod/* -DestinationPath prod_build.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-EXE-Build
        path: prod_build.zip
