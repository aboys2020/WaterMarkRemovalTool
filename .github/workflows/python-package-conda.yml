name: Build Windows EXE (Conda)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    # 设置合理的超时时间，防止任务挂起过久
    timeout-minutes: 30 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 配置 Node.js 版本，消除 "Node.js 20 is deprecated" 警告
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.9"
        # 显式指定 conda-forge 通道，避免 defaults 警告
        channels: conda-forge
        channel-priority: strict

    # 2. 缓存 Conda 包，极大提升后续构建速度，解决超时问题
    - name: Cache conda packages
      uses: actions/cache@v3
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ hashFiles('**/environment.yml') }}
        restore-keys: |
          ${{ runner.os }}-conda-

    - name: Create Conda Environment
      run: |
        # 3. 使用国内镜像源加速下载 (可选，若网络不稳定时启用)
        conda config --add channels https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main/
        conda config --add channels https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/free/
        
        # 安装核心依赖
        conda install pyqt=5 pikepdf pymupdf opencv pillow numpy scikit-image poppler -y
        
        # 安装 pip-only 的库
        pip install PyPDF2 pdf2image python-docx

    - name: Install PyInstaller
      run: |
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed prod.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WaterMarkRemovalTool-Windows
        path: dist/prod.exe
