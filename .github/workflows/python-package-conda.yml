name: Build Windows EXE (Final Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.9"
        activate-environment: myenv
        channels: conda-forge, defaults

    - name: Install Dependencies & Fix Pip
      shell: bash -l {0}
      run: |
        # 1. 强制更新 pip，防止报错 No module named pip
        python -m ensurepip --upgrade
        python -m pip install --upgrade pip
        
        # 2. 安装核心依赖 (指定版本以防冲突)
        pip install pyinstaller PyQt5==5.15.9 python-docx
        
        # 3. 如果有 requirements.txt，也可以取消下面这行的注释来安装其他库
        pip install -r requirements.txt

    - name: Verify Environment
      shell: bash -l {0}
      run: |
        echo "--- Python Version ---"
        python --version
        echo "--- Pip List ---"
        pip list
        echo "--- Check docx ---"
        python -c "import docx; print('docx OK')"
        echo "--- Check PyQt5 ---"
        python -c "from PyQt5 import QtWidgets; print('PyQt5 OK')"

    - name: Build with PyInstaller
      shell: bash -l {0}
      run: |
        # 关键修复：使用 --hidden-import 强制包含 docx 和可能漏掉的模块
        # --noconsole: 打包后不显示黑色命令行窗口 (如果是控制台程序请去掉此参数)
        # --onefile: 打包成单个 exe 文件
        pyinstaller --onefile --noconsole \
          --hidden-import=docx \
          --hidden-import=docx.opc \
          --hidden-import=pymod02_importers \
          prod.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp_Portable
        path: dist/prod.exe
