name: Build and Release Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.9"
        activate-environment: myenv
        channels: conda-forge, defaults

    - name: Install Dependencies & Fix Pip
      shell: bash -l {0}
      run: |
        # 1. 强制更新 pip，防止报错 No module named pip
        python -m ensurepip --upgrade
        python -m pip install --upgrade pip
        
        # 2. 安装核心依赖 (指定版本以防冲突)
        pip install pyinstaller PyQt5==5.15.9 python-docx
        
        # 如果有其他依赖，请在 requirements.txt 中管理并取消下面注释
        # pip install -r requirements.txt

    - name: Verify Environment
      shell: bash -l {0}
      run: |
        echo "Python Path:"
        which python
        echo "Pip List:"
        pip list

    - name: Build with PyInstaller
      shell: bash -l {0}
      run: |
        # 核心修改：使用 --hidden-import 强制包含 docx 和你的自定义模块
        # 如果你的主程序入口不是 prod.py，请替换成正确的文件名
        pyinstaller --onefile --noconsole \
          --hidden-import=docx \
          --hidden-import=pymod02_importers \
          prod.py

    - name: Upload Artifact (For Testing)
      uses: actions/upload-artifact@v4
      with:
        name: MyApp_Portable_Debug
        path: dist/prod.exe

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: dist/prod.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
